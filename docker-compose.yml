services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ppt-smart-backend
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ENABLE_QWEN_API: ${ENABLE_QWEN_API:-1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ppt-smart-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
